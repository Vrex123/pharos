# Example pharos config. Copy to ~/.config/pharos/config.yaml and edit.
#
# Rules:
#   name  - required, unique
#   host  - required
#   user  - required
#   port  - optional, default 22
#   docker - optional, default true
#   identity_file - optional, ~ is expanded
#
# Auth: existing SSH keys / ssh-agent / ssh config. Password auth is also
# supported via the 'c' (connect) action; passwords are entered into ssh's own
# prompt and never stored in this file. (Password servers need 'c' once per
# session; not available on Windows.)

servers:
  - name: prod
    host: 1.2.3.4
    port: 22
    user: root
    docker: true

  - name: staging
    host: staging.example.com
    port: 22
    user: deploy
    identity_file: ~/.ssh/id_ed25519
    docker: true
